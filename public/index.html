<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEO Dashboard — Milestones</title>
  <meta name="description" content="CEO Dashboard for tracking Freedcamp project milestones, progress, and team assignments.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
        </div>
        <div>
          <h1 class="header-title">CEO Dashboard</h1>
          <p class="header-subtitle">Freedcamp Milestones Overview</p>
        </div>
      </div>
      <div class="header-right">
        <span class="last-updated" id="lastUpdated">Loading...</span>
        <button class="btn-refresh" id="btnRefresh" title="Refresh data">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>
    </header>

    <!-- Stats Bar -->
    <section class="stats-bar" id="statsBar">
      <div class="stat-card" id="cardTotal" data-status="all">
        <div class="stat-icon stat-icon-total">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="statTotal">—</span>
          <span class="stat-label">Total Milestones</span>
        </div>
      </div>
      <div class="stat-card" id="cardCompleted" data-status="completed">
        <div class="stat-icon stat-icon-completed">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="statCompleted">—</span>
          <span class="stat-label">Completed</span>
        </div>
      </div>
      <div class="stat-card" id="cardOverdue" data-status="overdue">
        <div class="stat-icon stat-icon-overdue">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="statOverdue">—</span>
          <span class="stat-label">Overdue</span>
        </div>
      </div>
      <div class="stat-card" id="cardActive" data-status="active">
        <div class="stat-icon stat-icon-active">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="statActive">—</span>
          <span class="stat-label">In Progress</span>
        </div>
      </div>
    </section>

    <!-- Filters -->
    <section class="filters-bar">
      <div class="filter-tabs" id="projectFilters">
        <button class="filter-tab active" data-filter="all">All Projects</button>
      </div>
      <div class="filter-right">
        <div class="search-box">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search milestones..." />
        </div>
        <select id="assigneeFilter" class="status-select">
          <option value="all">All Team Members</option>
        </select>
        <select id="statusFilter" class="status-select">
          <option value="all">All Statuses</option>
          <option value="active">In Progress</option>
          <option value="completed">Completed</option>
          <option value="overdue">Overdue</option>
        </select>
      </div>
    </section>

    <!-- Milestones Grid -->
    <section class="milestones-grid" id="milestonesGrid">
      <!-- Loading skeletons -->
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </section>

    <!-- Empty State -->
    <div class="empty-state hidden" id="emptyState">
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
      <h3>No milestones found</h3>
      <p>Try adjusting your filters or check your Freedcamp projects.</p>
    </div>

    <!-- Error State -->
    <div class="error-state hidden" id="errorState">
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <h3>Failed to load data</h3>
      <p id="errorMessage">Something went wrong while connecting to Freedcamp.</p>
      <button class="btn-retry" id="btnRetry">Try Again</button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
